name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing v* tag to rebuild and publish; leave empty for a dry run
        required: false
        type: string

permissions: {}

concurrency:
  group: release-${{ github.workflow }}-${{ inputs.release_tag || github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: 1.97.1
  CARGO_AUDIT_VERSION: 0.22.2
  CARGO_XWIN_VERSION: 0.23.0
  CARGO_MACHETE_VERSION: 0.9.2

defaults:
  run:
    shell: bash

jobs:
  audit:
    name: Audit
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ inputs.release_tag && format('refs/tags/{0}', inputs.release_tag) || github.ref }}
      - name: Trace runner tools
        run: |
          echo "ImageOS=${ImageOS:-unknown}"
          echo "ImageVersion=${ImageVersion:-unknown}"
          rustup --version
          rustc +stable --version
          cargo +stable --version
          git --version
          gh --version
      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install "$RUST_VERSION" --profile minimal
          rustup default "$RUST_VERSION"
      - name: Trace pinned Rust tools
        run: |
          rustc --version
          cargo --version
      - name: Install cargo-audit
        run: cargo install cargo-audit --version "$CARGO_AUDIT_VERSION" --locked --no-default-features
      - name: Audit committed lockfile
        run: cargo audit --file Cargo.lock

  build:
    name: Windows build and package
    needs: audit
    permissions:
      contents: read
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ inputs.release_tag && format('refs/tags/{0}', inputs.release_tag) || github.ref }}
      - name: Trace runner tools
        run: |
          echo "ImageOS=${ImageOS:-unknown}"
          echo "ImageVersion=${ImageVersion:-unknown}"
          rustup --version
          rustc +stable --version
          cargo +stable --version
          git --version
          gh --version
      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install "$RUST_VERSION" --profile minimal --component clippy,rustfmt
          rustup default "$RUST_VERSION"
      - name: Trace pinned Rust tools
        run: |
          rustc --version
          cargo --version
      - name: Verify tag matches application version
        if: startsWith(github.ref, 'refs/tags/') || inputs.release_tag != ''
        shell: pwsh
        env:
          APP_PACKAGE: cleaner-app
          TAG_NAME: ${{ inputs.release_tag || github.ref_name }}
        run: |
          $metadata = cargo metadata --locked --no-deps --format-version 1 | ConvertFrom-Json
          $packages = @($metadata.packages | Where-Object { $_.name -eq $env:APP_PACKAGE })
          if ($packages.Count -ne 1) { throw "Expected exactly one $env:APP_PACKAGE package" }
          if ($env:TAG_NAME -ne "v$($packages[0].version)") {
            throw "Tag $env:TAG_NAME does not match application version v$($packages[0].version)"
          }
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Test complete workspace
        run: cargo test --workspace --no-fail-fast --locked
      - name: Lint complete workspace
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Build native release
        run: cargo build --workspace --release --locked
      - name: Package and verify release assets
        shell: pwsh
        env:
          PRODUCT: win-cleaner
        run: |
          $ErrorActionPreference = 'Stop'
          $dist = Join-Path $PWD 'dist'
          if (Test-Path $dist) { Remove-Item -Recurse -Force $dist }
          New-Item -ItemType Directory -Path $dist | Out-Null
          $exe = "$env:PRODUCT.exe"
          $zip = "$env:PRODUCT-windows-x86_64.zip"
          Copy-Item (Join-Path $PWD "target/release/$exe") (Join-Path $dist $exe)
          Compress-Archive -CompressionLevel Optimal -LiteralPath (Join-Path $dist $exe) -DestinationPath (Join-Path $dist $zip)
          $hashAssets = @($exe, $zip)
          $checksumLines = @($hashAssets | ForEach-Object {
            $hash = (Get-FileHash (Join-Path $dist $_) -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $_"
          })
          $checksumText = ($checksumLines -join "`n") + "`n"
          [IO.File]::WriteAllText((Join-Path $dist 'SHA256SUMS'), $checksumText, [Text.Encoding]::ASCII)
          $expectedFiles = @('SHA256SUMS', $exe, $zip) | Sort-Object
          $actualFiles = @(Get-ChildItem $dist -File | Select-Object -ExpandProperty Name | Sort-Object)
          if (@(Compare-Object $expectedFiles $actualFiles).Count -ne 0) { throw 'Release asset set is incorrect' }
          foreach ($line in Get-Content (Join-Path $dist 'SHA256SUMS')) {
            if ($line -cnotmatch '^([0-9a-f]{64})  (.+)$') { throw "Invalid checksum line: $line" }
            $actual = (Get-FileHash (Join-Path $dist $Matches[2]) -Algorithm SHA256).Hash.ToLowerInvariant()
            if ($Matches[1] -cne $actual) { throw "Checksum mismatch: $($Matches[2])" }
          }
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $archive = [IO.Compression.ZipFile]::OpenRead((Join-Path $dist $zip))
          try {
            $entries = @($archive.Entries | ForEach-Object FullName)
            if ($entries.Count -ne 1 -or $entries[0] -cne $exe) { throw 'ZIP must contain only the executable' }
          } finally {
            $archive.Dispose()
          }
      - name: Upload release assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: win-cleaner-release-assets
          path: |
            dist/win-cleaner.exe
            dist/win-cleaner-windows-x86_64.zip
            dist/SHA256SUMS
          if-no-files-found: error

  publish:
    name: Attest and publish
    if: startsWith(github.ref, 'refs/tags/') || inputs.release_tag != ''
    needs: build
    permissions:
      attestations: write # Publish provenance for each release asset.
      contents: write # Create the GitHub release and upload assets.
      id-token: write # Request the OIDC identity used for provenance.
    runs-on: ubuntu-24.04
    steps:
      - name: Download release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: win-cleaner-release-assets
          path: dist
      - name: Independently verify release assets
        env:
          PRODUCT: win-cleaner
        run: |
          exe="$PRODUCT.exe"
          zip="$PRODUCT-windows-x86_64.zip"
          mapfile -t expected_assets < <(printf '%s\n' SHA256SUMS "$exe" "$zip" | sort)
          mapfile -t actual_assets < <(find dist -maxdepth 1 -type f -printf '%f\n' | sort)
          [[ "${actual_assets[*]}" == "${expected_assets[*]}" ]]
          mapfile -t expected_hash_assets < <(printf '%s\n' "$exe" "$zip" | sort)
          mapfile -t actual_hash_assets < <(awk '{print $2}' dist/SHA256SUMS | sort)
          [[ "${actual_hash_assets[*]}" == "${expected_hash_assets[*]}" ]]
          awk 'length($1) != 64 || $1 !~ /^[0-9a-f]+$/ { exit 1 } END { if (NR != 2) exit 1 }' dist/SHA256SUMS
          (cd dist && sha256sum --check --strict SHA256SUMS)
          unzip -tq "dist/$zip"
          mapfile -t entries < <(unzip -Z1 "dist/$zip")
          [[ ${#entries[@]} -eq 1 && "${entries[0]}" == "$exe" ]]
      - name: Attest release assets
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: dist/*
      - name: Publish GitHub release
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          PRODUCT: win-cleaner
          TAG_NAME: ${{ inputs.release_tag || github.ref_name }}
        run: >-
          gh release create "$TAG_NAME"
          "dist/$PRODUCT.exe"
          "dist/$PRODUCT-windows-x86_64.zip"
          dist/SHA256SUMS
          --verify-tag
          --generate-notes
          --title "$TAG_NAME"

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: 1.97.1
  CARGO_AUDIT_VERSION: 0.22.2
  CARGO_XWIN_VERSION: 0.23.0
  CARGO_MACHETE_VERSION: 0.9.2

defaults:
  run:
    shell: bash

jobs:
  portable:
    name: Portable
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Trace runner tools
        run: |
          echo "ImageOS=${ImageOS:-unknown}"
          echo "ImageVersion=${ImageVersion:-unknown}"
          rustup --version
          rustc +stable --version
          cargo +stable --version
          git --version
          gh --version
      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install "$RUST_VERSION" --profile minimal --component clippy,rustfmt
          rustup default "$RUST_VERSION"
      - name: Trace pinned Rust tools
        run: |
          rustc --version
          cargo --version
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Test portable core
        run: cargo test --locked --no-fail-fast --package cleaner-core --package cleaner-catalog --package cleaner-platform
      - name: Lint portable core
        run: cargo clippy --locked --all-targets --package cleaner-core --package cleaner-catalog --package cleaner-platform -- -D warnings
      - name: Detect unused dependencies
        uses: bnjbvr/cargo-machete@ac30a525c0a8d163a92d727b3ff079ee3f6ecb08 # v0.9.2

  windows:
    name: Windows
    permissions:
      contents: read
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Trace runner tools
        run: |
          echo "ImageOS=${ImageOS:-unknown}"
          echo "ImageVersion=${ImageVersion:-unknown}"
          rustup --version
          rustc +stable --version
          cargo +stable --version
          git --version
          gh --version
      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install "$RUST_VERSION" --profile minimal --component clippy,rustfmt
          rustup default "$RUST_VERSION"
      - name: Trace pinned Rust tools
        run: |
          rustc --version
          cargo --version
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Test complete workspace
        run: cargo test --workspace --no-fail-fast --locked
      - name: Lint complete workspace
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Build native release
        run: cargo build --workspace --release --locked
      - name: Upload Windows executable
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: win-cleaner-windows-x86_64
          path: target/release/win-cleaner.exe
          if-no-files-found: error

  audit:
    name: Audit
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Trace runner tools
        run: |
          echo "ImageOS=${ImageOS:-unknown}"
          echo "ImageVersion=${ImageVersion:-unknown}"
          rustup --version
          rustc +stable --version
          cargo +stable --version
          git --version
          gh --version
      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install "$RUST_VERSION" --profile minimal
          rustup default "$RUST_VERSION"
      - name: Trace pinned Rust tools
        run: |
          rustc --version
          cargo --version
      - name: Install cargo-audit
        run: cargo install cargo-audit --version "$CARGO_AUDIT_VERSION" --locked --no-default-features
      - name: Audit committed lockfile
        run: cargo audit --file Cargo.lock

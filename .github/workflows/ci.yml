name: CI

on:
  push:
  pull_request:

permissions: {}

jobs:
  portable:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          toolchain: 1.97.1
          components: clippy, rustfmt
      - run: cargo fmt --all -- --check
      - run: cargo test --workspace --no-fail-fast --locked
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Detect unused dependencies
        uses: bnjbvr/cargo-machete@ac30a525c0a8d163a92d727b3ff079ee3f6ecb08 # v0.9.2

  windows:
    permissions:
      contents: read
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          toolchain: 1.97.1
          components: clippy, rustfmt
      - run: cargo fmt --all -- --check
      - run: cargo test --workspace --no-fail-fast --locked
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - run: cargo build --workspace --release --locked
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: win-cleaner-windows-x86_64
          path: target/release/win-cleaner.exe
          if-no-files-found: error

  audit:
    permissions:
      contents: read
      checks: write
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: rustsec/audit-check@858dc40f52ca2b8570b7a997c1c4e35c6fc9a432 # Node 24
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

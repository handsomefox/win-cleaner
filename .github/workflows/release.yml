name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Verify tag matches workspace version
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $metadata = cargo metadata --no-deps --format-version 1 | ConvertFrom-Json
          $version = ($metadata.packages | Where-Object name -eq 'cleaner-app').version
          if ("${{ github.ref_name }}" -ne "v$version") {
            throw "Tag ${{ github.ref_name }} does not match workspace version v$version"
          }
      - run: cargo fmt --all -- --check
      - run: cargo test --workspace --no-fail-fast
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo build --workspace --release
      - name: Package Windows release
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target/release/win-cleaner.exe dist/win-cleaner.exe
          $hash = (Get-FileHash dist/win-cleaner.exe -Algorithm SHA256).Hash.ToLower()
          "$hash  win-cleaner.exe" | Set-Content -Encoding ascii dist/SHA256SUMS
          Compress-Archive -CompressionLevel Optimal -Path dist/win-cleaner.exe,dist/SHA256SUMS -DestinationPath dist/win-cleaner-windows-x86_64.zip
          @('win-cleaner.exe', 'SHA256SUMS', 'win-cleaner-windows-x86_64.zip') | ForEach-Object {
            if (-not (Test-Path "dist/$_")) { throw "Missing release asset: $_" }
          }
          $expected = (Get-Content dist/SHA256SUMS).Split(' ')[0]
          $actual = (Get-FileHash dist/win-cleaner.exe -Algorithm SHA256).Hash.ToLower()
          if ($expected -ne $actual) { throw 'Packaged executable checksum mismatch' }
      - uses: actions/upload-artifact@v7
        with:
          name: win-cleaner-release-assets
          path: |
            dist/win-cleaner.exe
            dist/SHA256SUMS
            dist/win-cleaner-windows-x86_64.zip
          if-no-files-found: error

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: win-cleaner-release-assets
          path: dist
      - name: Verify release assets
        run: test -f dist/win-cleaner.exe && test -f dist/SHA256SUMS && test -f dist/win-cleaner-windows-x86_64.zip
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/win-cleaner.exe
            dist/win-cleaner-windows-x86_64.zip
            dist/SHA256SUMS
